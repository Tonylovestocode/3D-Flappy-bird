<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Flappy Bird</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
        font-family: Arial, Helvetica, sans-serif;
      }

      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
        color: #ffffff;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      #score {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 28px;
        font-weight: bold;
      }

      #message {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 24px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div id="score">Score: 0</div>
      <div id="message">Press Space / Click to Start</div>
    </div>
    <script type="module" src="game.js"></script>
  </body>
</html>
